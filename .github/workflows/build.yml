name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-2025, macos-15]
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            artifact-name: meshvpn-linux-amd64
            artifact-ext: tar.gz
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            artifact-name: meshvpn-windows-amd64
            artifact-ext: zip
          - os: macos-15
            target: x86_64-apple-darwin
            artifact-name: meshvpn-macos-amd64
            artifact-ext: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare release files
        run: |
          mkdir -p release
          if [ "${{ matrix.os }}" = "windows-2025" ]; then
            cp target/${{ matrix.target }}/release/meshvpn.exe release/
            cp README.md release/
            cd release && powershell -Command "Compress-Archive -Path * -DestinationPath ../meshvpn-windows-amd64.zip -Force"
          else
            cp target/${{ matrix.target }}/release/meshvpn release/
            cp README.md release/
            cd release && tar -czf ../meshvpn-${{ matrix.os }}-amd64.tar.gz .
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact-name }}
          path: meshvpn-*.${{ matrix.artifact-ext }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts/
          pattern: '*'
          merge-multiple: true
          
      - name: Display files
        run: ls -la artifacts/
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.{zip,tar.gz}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

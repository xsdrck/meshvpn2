name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-2025
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Create release package
        shell: pwsh
        run: |
          mkdir -p release
          Copy-Item target/x86_64-pc-windows-msvc/release/meshvpn.exe -Destination release/
          Copy-Item README.md -Destination release/
          Compress-Archive -Path release/* -DestinationPath meshvpn-windows-amd64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshvpn-windows-exe
          path: meshvpn-windows-amd64.zip
